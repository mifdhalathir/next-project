<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Karsa Cafe Padang</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        cream: { 50:'#fefdf8', 100:'#fdf6e3', 200:'#f5ead0', 300:'#e8d5a8' },
        wood: { 600:'#5d4037', 700:'#4a3728', 800:'#3e2723', 900:'#2c1a12' },
      },
      fontFamily: { display:['Playfair Display','serif'], body:['Inter','sans-serif'] }
    }
  }
}
</script>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2c1a12">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center relative overflow-hidden bg-wood-800">

<!-- Page Transition Overlay -->
<div id="pageTransition" class="page-transition"></div>

<!-- Animated Mesh Gradient -->
<div class="mesh-gradient-container">
    <div class="mesh-ball mesh-ball-1"></div>
    <div class="mesh-ball mesh-ball-2"></div>
    <div class="mesh-ball mesh-ball-3"></div>
</div>

<!-- Login Card -->
<div class="login-card relative z-10 w-full max-w-md mx-4">
    <div class="glass-login rounded-3xl p-10 shadow-2xl">
        <div class="text-center mb-10">
            <h1 class="font-display text-4xl font-bold text-white tracking-[0.2em]">KARSA <span class="text-amber-500">CAFE</span></h1>
            <div class="w-16 h-1 bg-amber-500 mx-auto mt-4 mb-4 rounded-full"></div>
            <p id="defaultSubtitle" class="text-stone-300 text-sm tracking-widest uppercase">Ruang Inspirasi</p>
            <div id="personalGreeting" class="hidden mt-2">
                <p class="text-amber-500 font-display text-lg font-semibold italic">Selamat datang kembali, <span id="savedNameDisplay"></span>!</p>
                <p class="text-stone-400 text-xs mt-1 tracking-wider">Mau ngopi di meja mana hari ini?</p>
            </div>
        </div>
        
        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-cream-200 text-xs font-bold uppercase tracking-widest mb-2">Nama Lengkap</label>
                <input id="userName" type="text" required placeholder="Masukkan namamu..." class="w-full bg-white/5 border border-white/10 text-white placeholder-stone-500 rounded-xl px-4 py-4 text-sm focus:outline-none focus:border-amber-500 focus:bg-white/10 transition-all">
            </div>
            
            <div>
                <label class="block text-cream-200 text-xs font-bold uppercase tracking-widest mb-2">Password</label>
                <input id="password" type="password" required placeholder="Masukkan password..." class="w-full bg-white/5 border border-white/10 text-white placeholder-stone-500 rounded-xl px-4 py-4 text-sm focus:outline-none focus:border-amber-500 focus:bg-white/10 transition-all">
            </div>

            <div>
                <label class="block text-cream-200 text-xs font-bold uppercase tracking-widest mb-2">Nomor Meja</label>
                <select id="tableNumber" required class="w-full bg-white/5 border border-white/10 text-white rounded-xl px-4 py-4 text-sm focus:outline-none focus:border-amber-500 focus:bg-white/10 transition-all appearance-none">
                    <option value="" class="bg-wood-900">Pilih Nomor Meja</option>
                    <option value="01" class="bg-wood-900">Meja 01 (Indoor)</option>
                    <option value="02" class="bg-wood-900">Meja 02 (Indoor)</option>
                    <option value="03" class="bg-wood-900">Meja 03 (Indoor)</option>
                    <option value="04" class="bg-wood-900">Meja 04 (Indoor)</option>
                    <option value="05" class="bg-wood-900">Meja 05 (Outdoor)</option>
                    <option value="06" class="bg-wood-900">Meja 06 (Outdoor)</option>
                    <option value="07" class="bg-wood-900">Meja 07 (Outdoor)</option>
                    <option value="08" class="bg-wood-900">Meja 08 (Outdoor)</option>
                </select>
            </div>

            <button type="submit" id="loginBtn" class="w-full bg-amber-700 hover:bg-amber-600 text-white py-4 rounded-xl text-sm font-bold tracking-[0.2em] uppercase transition-all transform hover:scale-[1.05] btn-glow">Masuk Sekarang</button>
        </form>
        
        <p class="text-center text-stone-400 text-xs mt-10">Belum punya akun? <a href="#" class="text-amber-500 hover:text-amber-400 font-bold transition">Daftar di Sini</a></p>
    </div>
    <p class="text-center text-stone-600 text-xs mt-8 tracking-widest uppercase">&copy; 2024 Karsa Cafe Padang</p>
</div>


<script src="script.js"></script>
</body>
</html>
